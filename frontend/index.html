<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lumen — Premium Resume Builder</title>
    <meta name="description" content="Craft an ATS-ready, editorial-quality resume in minutes. AI-assisted, beautifully designed." />
    <meta property="og:title" content="Lumen — Premium Resume Builder" />
    <meta property="og:description" content="Craft an ATS-ready, editorial-quality resume in minutes." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("lumen_theme") || "dark";
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
